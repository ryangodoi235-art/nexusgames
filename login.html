<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NexusGames</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <h2 id="formTitle">🔐 Entrar na NexusGames</h2>
        
        <form id="authForm">
            <!-- Div de Cadastro (escondida inicialmente) -->
            <div id="cadastroDiv" style="display: none;">
                <div class="input-group">
                    <label>Nome completo</label>
                    <input type="text" id="nome" placeholder="Digite seu nome">
                </div>
                <div class="input-group">
                    <label>CEP (para entrega)</label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="text" id="cep" placeholder="00000-000" maxlength="9" style="flex: 1;">
                        <button type="button" id="btnLocalizarCEP" style="width: auto; padding: 12px 20px; background: #7c3aed; white-space: nowrap; margin-top: 0;">📍 Usar localização</button>
                    </div>
                </div>
                <div class="input-group">
                    <label>Endereço (Rua)</label>
                    <input type="text" id="endereco" placeholder="Nome da rua">
                </div>
                <div class="row">
                    <div class="input-group">
                        <label>Número</label>
                        <input type="text" id="numero" placeholder="Nº da casa">
                    </div>
                    <div class="input-group">
                        <label>Complemento</label>
                        <input type="text" id="complemento" placeholder="Apto, Bloco, Casa...">
                    </div>
                </div>
                <div class="row">
                    <div class="input-group">
                        <label>Cidade</label>
                        <input type="text" id="cidade" placeholder="Cidade">
                    </div>
                    <div class="input-group">
                        <label>Estado</label>
                        <select id="estado">
                            <option value="">Estado</option>
                            <option value="AC">AC</option><option value="AL">AL</option><option value="AP">AP</option>
                            <option value="AM">AM</option><option value="BA">BA</option><option value="CE">CE</option>
                            <option value="DF">DF</option><option value="ES">ES</option><option value="GO">GO</option>
                            <option value="MA">MA</option><option value="MT">MT</option><option value="MS">MS</option>
                            <option value="MG">MG</option><option value="PA">PA</option><option value="PB">PB</option>
                            <option value="PR">PR</option><option value="PE">PE</option><option value="PI">PI</option>
                            <option value="RJ">RJ</option><option value="RN">RN</option><option value="RS">RS</option>
                            <option value="RO">RO</option><option value="RR">RR</option><option value="SC">SC</option>
                            <option value="SP">SP</option><option value="SE">SE</option><option value="TO">TO</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Campos comuns -->
            <div class="input-group">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="senha" placeholder="••••••••" required>
            </div>

            <button type="submit" id="submitBtn">Entrar</button>
        </form>

        <div class="toggle">
            <a href="#" id="toggleLink">📝 Criar conta</a>
        </div>

        <a href="index.html" class="back-home">← Voltar para a loja</a>

        <div id="msg" class="mensagem"></div>
    </div>

    <script src="login.js"></script>
</body>
</html>
