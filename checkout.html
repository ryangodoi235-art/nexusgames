<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento | NexusGames</title>
    <link rel="stylesheet" href="checkout.css">
</head>
<body>

    <div class="checkout-container">

        <!-- RESUMO -->
        <div class="order-summary">
            <h2>🎮 Resumo do Pedido</h2>
            <div id="checkoutItems">
                <!-- Os jogos vão aparecer aqui -->
            </div>
            <div class="total">
                <span>Total:</span>
                <span id="checkoutTotal">R$ 0,00</span>
            </div>
        </div>

        <!-- PAGAMENTO E ENDEREÇO -->
        <div class="payment-form">
            <h2>📦 Endereço de Entrega</h2>

            <div class="input-group">
                <label>Endereço</label>
                <input type="text" id="enderecoEntrega" placeholder="Rua, número, bairro">
            </div>

            <div class="input-group">
                <label>CEP</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="cepEntrega" placeholder="00000-000" maxlength="9" style="flex: 1;">
                    <button type="button" id="btnBuscarCEP" style="width: auto; padding: 12px 20px; background: #7c3aed; white-space: nowrap;">🔍 Buscar</button>
                </div>
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Cidade</label>
                    <input type="text" id="cidadeEntrega" placeholder="Cidade" readonly>
                </div>
                <div class="input-group">
                    <label>Estado</label>
                    <input type="text" id="estadoEntrega" placeholder="UF" readonly>
                </div>
            </div>

            <h2 style="margin-top: 20px;">💳 Dados do Cartão</h2>
            <form id="paymentForm">
                <div class="input-group">
                    <label>Nome no cartão</label>
                    <input type="text" id="cardName" placeholder="Digite seu nome" required>
                </div>

                <div class="input-group">
                    <label>Número do cartão</label>
                    <input type="text" id="cardNumber" placeholder="0000 0000 0000 0000" required>
                </div>

                <div class="card-row">
                    <div class="input-group">
                        <label>Validade</label>
                        <input type="text" id="cardExpiry" placeholder="MM/AA" required>
                    </div>
                    <div class="input-group">
                        <label>CVV</label>
                        <input type="text" id="cardCvv" placeholder="123" required>
                    </div>
                </div>

                <button type="submit" class="pay-btn">Finalizar Pagamento</button>
            </form>
            <a href="index.html" style="display: inline-block; margin-top: 20px; color: #7c3aed; text-decoration: none; text-align: center; width: 100%;">← Voltar para a loja</a>
        </div>

    </div>

    <script src="checkout.js"></script>
</body>
</html>
